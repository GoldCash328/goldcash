<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0e17; /* √áox t√ľnd mavi/qara fon */
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary-color: #007bff; /* Paralayan mavi */
            --text-color: #ffffff;
            --text-secondary: #8b9bb4;
            --border-color: rgba(255, 255, 255, 0.08);
            --success-color: #28a745;
            --error-color: #dc3545;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        /* Q…ôŇü…ông Ňě…ôffaf Pul AnimasiyasńĪ */
        .money-rain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .coin {
            position: absolute;
            font-size: 20px;
            opacity: 0;
            animation: fallAndFade linear forwards;
            color: rgba(255, 255, 255, 0.4); /* Ňě…ôffaf ańü/g√ľm√ľŇü√ľ */
        }

        @keyframes fallAndFade {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ∆Źsas Konteyner */
        .auth-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            perspective: 1000px;
        }

        /* Kart Stili (Glassmorphism) */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
        }

        /* BaŇülńĪqlar */
        h2 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5c7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin: 0 0 30px 0;
            font-size: 15px;
        }

        /* Input Sah…ôl…ôri */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i.input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 16px 15px 16px 50px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-color);
            font-size: 16px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.2);
        }

        .input-group input:focus + i.input-icon {
            color: var(--primary-color);
        }

        /* Ňěifr…ôni G√∂st…ôr/Gizl…ô ńįkonu */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            z-index: 2;
        }

        /* D√ľym…ôl…ôr */
        button.btn-primary {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button.btn-primary:active {
            transform: scale(0.97);
            background: #0069d9;
        }

        /* Linkl…ôr */
        .footer-links {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        /* Ňěifr…ô T…ôl…ôbl…ôri VizualńĪ */
        .password-policies {
            text-align: left;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: -10px;
            margin-bottom: 20px;
            padding-left: 5px;
        }
        .policy-item { margin: 5px 0; display: flex; align-items: center; }
        .policy-item i { margin-right: 8px; font-size: 12px; }
        .policy-item.valid { color: var(--success-color); }
        .policy-item.invalid { color: var(--text-secondary); }

    </style>
</head>
<body>

    <div class="money-rain" id="moneyRain"></div>

    <div class="auth-container">
        
        <div class="card" id="loginCard">
            <h2>GiriŇü</h2>
            <p class="subtitle">Davam etm…ôk √ľ√ß√ľn hesabńĪnńĪza daxil olun</p>
            
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="loginUser" placeholder="ńįstifad…ô√ßi adńĪ">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="loginPass" placeholder="Ňěifr…ô">
                <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPass', this)"></i>
            </div>
            
            <button class="btn-primary" onclick="handleLogin()">GiriŇü et</button>
            
            <div class="footer-links">
                HesabńĪnńĪz yoxdur? <a href="#" onclick="showCard('registerCard')">Qeydiyyatdan ke√ßin</a>
            </div>
        </div>

        <div class="card hidden" id="registerCard">
            <h2>Qeydiyyat</h2>
            <p class="subtitle">Yeni hesab yaradńĪn</p>
            
            <div style="display: flex; gap: 10px;">
                <div class="input-group">
                    <i class="fas fa-id-card input-icon"></i>
                    <input type="text" id="regName" placeholder="Ad">
                </div>
                <div class="input-group">
                    <input type="text" id="regSurname" placeholder="Soyad" style="padding-left: 15px;">
                </div>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="regEmail" placeholder="Gmail √ľnvanńĪ">
            </div>
            
            <div class="input-group">
                <i class="fas fa-key input-icon"></i>
                <input type="password" id="regPass1" placeholder="Ňěifr…ô yaradńĪn" oninput="validatePassword()">
                <i class="fas fa-eye toggle-password" onclick="togglePassword('regPass1', this)"></i>
            </div>

            <div class="password-policies">
                <div class="policy-item invalid" id="pol-length"><i class="fas fa-circle"></i>Min. 8 simvol</div>
                <div class="policy-item invalid" id="pol-upper"><i class="fas fa-circle"></i>Min. 1 b√∂y√ľk h…ôrf</div>
                <div class="policy-item invalid" id="pol-number"><i class="fas fa-circle"></i>Min. 1 r…ôq…ôm</div>
                <div class="policy-item invalid" id="pol-symbol"><i class="fas fa-circle"></i>Min. 1 simvol (!@#$)</div>
            </div>
            
            <div class="input-group">
                <i class="fas fa-check-double input-icon"></i>
                <input type="password" id="regPass2" placeholder="Ňěifr…ôni t…ôkrarla">
            </div>
            
            <button class="btn-primary" onclick="handleRegister()">Tamamla</button>
            
            <div class="footer-links">
                ArtńĪq √ľzvsiniz? <a href="#" onclick="showCard('loginCard')">GiriŇü edin</a>
            </div>
        </div>
    </div>

    <script>
        // Telegram WebApp BaŇülatma
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        // Botun m√∂vzusuna uyńüun r…ôngl…ôri t…ônziml…ôm…ôk olar (ist…ôy…ô bańülńĪ)
        // tg.setHeaderColor(getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim());

        // --- UNńįVERSAL FUNKSńįYALAR ---

        // Kartlar arasńĪ ke√ßid
        function showCard(cardId) {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('registerCard').classList.add('hidden');
            const target = document.getElementById(cardId);
            target.classList.remove('hidden');
            tg.HapticFeedback.impactOccurred('light'); // Y√ľng√ľl vibrasiya
        }

        // Ňěifr…ôni g√∂st…ôr/gizl…ô
        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconEl.classList.remove('fa-eye');
                iconEl.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                iconEl.classList.remove('fa-eye-slash');
                iconEl.classList.add('fa-eye');
            }
        }

        // --- QEYDńįYYAT VALńįDASńįYASI (Sizin ist…ôdiyiniz m√ľr…ôkk…ôb qaydalar) ---
        let isPasswordValid = false;

        function validatePassword() {
            const pass = document.getElementById('regPass1').value;
            
            const policies = {
                length: pass.length >= 8,
                upper: /[A-Z]/.test(pass),
                number: /[0-9]/.test(pass),
                symbol: /[!@#$%^&*(),.?":{}|<>]/.test(pass)
            };

            // Vizual yenil…ôm…ô
            updatePolicyView('pol-length', policies.length);
            updatePolicyView('pol-upper', policies.upper);
            updatePolicyView('pol-number', policies.number);
            updatePolicyView('pol-symbol', policies.symbol);

            isPasswordValid = policies.length && policies.upper && policies.number && policies.symbol;
        }

        function updatePolicyView(elId, isValid) {
            const el = document.getElementById(elId);
            const icon = el.querySelector('i');
            if(isValid) {
                el.classList.remove('invalid');
                el.classList.add('valid');
                icon.classList.remove('fa-circle');
                icon.classList.add('fa-check-circle');
            } else {
                el.classList.remove('valid');
                el.classList.add('invalid');
                icon.classList.remove('fa-check-circle');
                icon.classList.add('fa-circle');
            }
        }

        // --- BńįZNES M∆ŹNTńįQńį (H…ôl…ôlik alert il…ô, sonra bazaya bańülanacaq) ---

        function handleLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            if(!user || !pass) {
                tg.HapticFeedback.notificationOccurred('error');
                alert("XanalarńĪ doldurun!");
                return;
            }

            // N√ľmun…ô yoxlama
            if(user === "admin" && pass === "Admin123!") {
                tg.HapticFeedback.notificationOccurred('success');
                alert("GiriŇü uńüurludur! Ana s…ôhif…ôy…ô y√∂nl…ôndirilir...");
                tg.close(); // V…ô ya ana s…ôhif…ôni g√∂st…ôr
            } else {
                tg.HapticFeedback.notificationOccurred('error');
                alert("ńįstifad…ô√ßi adńĪ v…ô ya Ňüifr…ô s…ôhvdir!");
            }
        }

        function handleRegister() {
            const name = document.getElementById('regName').value;
            const surname = document.getElementById('regSurname').value;
            const email = document.getElementById('regEmail').value;
            const pass1 = document.getElementById('regPass1').value;
            const pass2 = document.getElementById('regPass2').value;

            if(!name || !surname || !email || !pass1 || !pass2) {
                alert("B√ľt√ľn xanalarńĪ doldurun!");
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            // Gmail yoxlamasńĪ (sad…ô)
            if(!email.includes('@gmail.com')) {
                alert("Z…ôhm…ôt olmasa d√ľzg√ľn Gmail √ľnvanńĪ daxil edin.");
                return;
            }

            // M√ľr…ôkk…ôb Ňüifr…ô yoxlamasńĪ
            if(!isPasswordValid) {
                alert("Ňěifr…ô t…ôl…ôbl…ôr…ô cavab vermir!");
                return;
            }

            // Ňěifr…ô t…ôkrarńĪ yoxlamasńĪ
            if(pass1 !== pass2) {
                alert("Ňěifr…ôl…ôr √ľst-√ľst…ô d√ľŇüm√ľr!");
                return;
            }

            tg.HapticFeedback.notificationOccurred('success');
            alert("Qeydiyyat uńüurludur! ńįndi giriŇü ed…ô bil…ôrsiniz.");
            showCard('loginCard');
        }


        // --- ESTETńįK: Pul YańüńĪŇüńĪ AnimasiyasńĪ (Daha professional) ---
        function createMoney() {
            const container = document.getElementById('moneyRain');
            // G√ľm√ľŇü√ľ/Ňü…ôffaf ikonlar
            const icons = ['&#xf155;', '&#xf0d6;', '&#xf51e;']; // $, billete, coins
            
            setInterval(() => {
                const coin = document.createElement('i');
                coin.className = 'fas coin';
                coin.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                
                // Random pozisiya v…ô √∂l√ß√ľ
                const startLeft = Math.random() * 100;
                const size = Math.random() * 15 + 15; // 15px - 30px
                const duration = Math.random() * 4 + 3; // 3s - 7s
                
                coin.style.left = startLeft + 'vw';
                coin.style.fontSize = size + 'px';
                coin.style.animationDuration = duration + 's';
                
                // Random x…ôfif horizontal h…ôr…ôk…ôt
                coin.style.setProperty('--end-x', (Math.random() * 20 - 10) + 'vw');

                container.appendChild(coin);
                
                // Animasiya bit…ônd…ô sil
                setTimeout(() => { coin.remove(); }, duration * 1000);
            }, 600); // H…ôr 0.6 saniy…ôd…ôn bir yeni pul
        }

        // BaŇülat
        createMoney();
    </script>
</body>
</html>
