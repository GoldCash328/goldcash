<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Cash Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0e17;
            --gold: #FFD700;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
        }

        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }

        /* Qızılı Başlıq */
        .gold-header { 
            text-align: center; font-size: 36px; font-weight: 800; 
            color: var(--gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            margin: 20px 0; letter-spacing: 2px;
        }

        /* Ağ Çərçivəli Məlumatlar */
        .info-box {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px; border-radius: 15px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px;
        }
        .info-box i { font-size: 22px; color: var(--gold); }

        /* Düymə */
        button {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: var(--gold); color: #000; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        button:active { transform: scale(0.96); box-shadow: 0 0 15px var(--gold); }

        /* Qızıl Pul Animasiyası */
        .gold-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .g-coin { position: absolute; font-size: 24px; animation: fall linear infinite; color: var(--gold); opacity: 0.3; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="gold-rain" id="goldRain"></div>
    
    <div class="gold-header">GOLD CASH</div>

    <div class="info-box"><i class="fas fa-coins"></i> <span>Gündəlik yatırımla 15% stabil gəlir! 💰</span></div>
    <div class="info-box"><i class="fas fa-lock"></i> <span>Maliyyə əməliyyatları tam qorunur! 🛡️</span></div>
    <div class="info-box"><i class="fas fa-user-plus"></i> <span>Hər dost dəvətinə 5% bonus qazan! 🤝</span></div>
    <div class="info-box"><i class="fas fa-crown"></i> <span>VIP statusla limitləri ikiqat artır! 👑</span></div>

    <button onclick="alert('Yatırım bölməsinə yönləndirilirsiniz...')">YATIRIM ET VƏ QAZAN</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Qızıl pul animasiyası
        const rain = document.getElementById('goldRain');
        for(let i=0; i<15; i++) {
            let c = document.createElement('div');
            c.innerHTML = '🪙'; c.className = 'g-coin';
            c.style.left = Math.random()*100 + 'vw';
            c.style.animationDuration = (Math.random()*4+4) + 's';
            c.style.animationDelay = Math.random()*5 + 's';
            rain.appendChild(c);
        }
    </script>
</body>
</html>
